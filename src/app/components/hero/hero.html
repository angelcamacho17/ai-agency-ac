<section
  id="home"
  class="hero-section relative min-h-screen flex items-center justify-center overflow-hidden"
  role="banner"
>
  <!-- Atmospheric Background -->
  <app-nebula-background></app-nebula-background>
  <app-particles></app-particles>

  <!-- Content -->
  <div class="relative z-10 max-w-7xl mx-auto px-6 text-center container">
    <!-- Hero Headline -->
    <h1
      class="text-6xl md:text-7xl lg:text-8xl font-extrabold leading-[1.1] tracking-tighter mb-8 animate-fade-in-glow opacity-0 [animation-delay:200ms]"
    >
      <span class="block text-text-primary">{{ 'hero.line1' | translate }}</span>
      <span class="block text-neon-green font-serif italic text-glow-green-strong">{{ 'hero.line2' | translate }}</span>
      <span class="block text-text-primary">{{ 'hero.line3' | translate }}</span>
    </h1>

    <!-- Subheadline -->
    <p
      class="text-l md:text-l text-text-secondary font-light mb-12 animate-fade-in-glow opacity-0 [animation-delay:400ms]"
    >
      {{ 'hero.subhead' | translate }}
    </p>

    <!-- CTA Button -->
    <div class="animate-fade-in-glow opacity-0 [animation-delay:800ms]">
      <a
        href="https://calendly.com/angel-camacho-michelangelodevs/30min"
        target="_blank"
        rel="noopener noreferrer"
        appMagneticButton
        class="inline-block px-12 py-5 bg-neon-green text-dark-950 text-lg font-bold rounded-2xl transition-all duration-300 hover:shadow-glow-green-lg hover:scale-105 animate-pulse-glow focus:outline-none focus:ring-2 focus:ring-neon-green focus:ring-offset-2 focus:ring-offset-dark-950"
        [attr.aria-label]="'hero.bookCall' | translate"
      >
        {{ 'hero.bookCall' | translate }}
      </a>
    </div>

  </div>
</section>
