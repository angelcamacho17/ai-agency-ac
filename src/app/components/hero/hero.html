<section
  id="home"
  class="hero-section relative flex items-center justify-center overflow-hidden"
  role="banner"
>
  <div class="hero-nebula-blob" aria-hidden="true"></div>
  <app-particles></app-particles>

  <div class="relative z-10 max-w-7xl mx-auto px-6 text-center container">
    <h1
      class="text-6xl md:text-7xl lg:text-8xl font-extrabold leading-[1.1] tracking-tighter mb-8"
    >
      <!-- Each line wrapped in .hero-word so the intro GSAP timeline can target them -->
      <span class="block text-text-primary">
        <span class="hero-word">{{ 'hero.line1' | translate }}</span>
      </span>
      <span class="block text-neon-green font-serif italic text-glow-green-strong">
        <span class="hero-word">{{ 'hero.line2' | translate }}</span>
      </span>
      <span class="block text-text-primary">
        <span class="hero-word">{{ 'hero.line3' | translate }}</span>
      </span>
    </h1>

    <p class="hero-sub text-l md:text-l text-text-secondary font-light mb-12">
      {{ 'hero.subhead' | translate }}
    </p>
  </div>
</section>
